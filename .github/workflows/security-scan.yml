# セキュリティスキャン統合ワークフロー
# 目的: 依存関係、コンテナ、コード、IaC、シークレットの脆弱性を一元管理

name: Security Scan
on:
  workflow_dispatch:
  schedule:
    # 毎週月曜 00:15 UTC / 09:15 JST。
    # 毎時0分付近の GitHub Actions 混雑を避けるため15分にずらす。
    - cron: "15 0 * * 1"
  # pull_request:
  #   branches: [main]

concurrency:
  group: security-scan
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Run Trivy vulnerability scanner (npm)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4.36.0
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          tags: nestjs-hannibal-3:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Run Trivy vulnerability scanner (Docker)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "nestjs-hannibal-3:${{ github.sha }}"
          format: "sarif"
          output: "trivy-container-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy container results
        uses: github/codeql-action/upload-sarif@v4.36.0
        if: always()
        with:
          sarif_file: "trivy-container-results.sarif"
  sast-scan:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.0
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.36.0
      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v4.36.0
  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - dependency-scan
      - container-scan
      - sast-scan
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Container Scan: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SAST Scan: ${{ needs.sast-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "詳細は [Security > Code scanning alerts](../../security/code-scanning) を確認" >> $GITHUB_STEP_SUMMARY
