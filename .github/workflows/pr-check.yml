name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.12.1"
  NODE_VERSION: "24"

jobs:
  pr-policy-check:
    name: PR Policy Check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Require linked issue and mandatory labels
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          labels_fetch_ok=false

          for attempt in 1 2 3 4 5; do
            labels_fetch_ok=false

            if labels_json=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels --jq '[.labels[].name]'); then
              labels_fetch_ok=true
              echo "Current PR labels: $labels_json"
            else
              labels_json="[]"
              echo "::warning::Failed to fetch current PR labels from GitHub API."
            fi

            counts=$(LABEL_NAMES_JSON="$labels_json" python3 - <<'PY'
          import json
          import os

          labels = json.loads(os.environ["LABEL_NAMES_JSON"])

          def count(prefix: str) -> int:
              return sum(1 for label in labels if label.startswith(prefix))

          print(count("type:"))
          print(count("area:"))
          print(count("risk:"))
          print(count("cost:"))
          print("true" if any(label in {"risk:medium", "risk:high"} for label in labels) else "false")
          print("true" if any(label in {"cost:medium", "cost:large"} for label in labels) else "false")
          PY
            )

            type_count=$(printf '%s\n' "$counts" | sed -n '1p')
            area_count=$(printf '%s\n' "$counts" | sed -n '2p')
            risk_count=$(printf '%s\n' "$counts" | sed -n '3p')
            cost_count=$(printf '%s\n' "$counts" | sed -n '4p')
            strict_by_labels=$(printf '%s\n' "$counts" | sed -n '5p')
            strict_by_cost=$(printf '%s\n' "$counts" | sed -n '6p')

            if [ "$type_count" -eq 1 ] && [ "$area_count" -ge 1 ] && [ "$risk_count" -eq 1 ] && [ "$cost_count" -eq 1 ]; then
              break
            fi

            if [ "$attempt" -lt 5 ]; then
              echo "Required PR labels are not complete yet; retrying label fetch..."
              sleep 2
            fi
          done

          if [ "$labels_fetch_ok" != true ]; then
            echo "::error::Failed to fetch current PR labels from GitHub API."
            exit 1
          fi

          # --- Collect check results ---
          errors=()

          type_label=$(echo "$labels_json" | jq -r '[.[] | select(startswith("type:"))] | join(", ")')
          area_labels=$(echo "$labels_json" | jq -r '[.[] | select(startswith("area:"))] | join(", ")')
          risk_label=$(echo "$labels_json" | jq -r '[.[] | select(startswith("risk:"))] | join(", ")')
          cost_label=$(echo "$labels_json" | jq -r '[.[] | select(startswith("cost:"))] | join(", ")')

          if [ "$type_count" -ne 1 ]; then
            errors+=("type:* ラベルがちょうど1つ必要です（現在: ${type_count}件）")
            type_status="❌ ${type_count}件（ちょうど1つ必要）"
          else
            type_status="✅ \`${type_label}\`"
          fi

          if [ "$area_count" -lt 1 ]; then
            errors+=("area:* ラベルが1つ以上必要です（現在: 0件）")
            area_status="❌ 0件（1つ以上必要）"
          else
            area_status="✅ \`${area_labels}\`"
          fi

          if [ "$risk_count" -ne 1 ]; then
            errors+=("risk:* ラベルがちょうど1つ必要です（現在: ${risk_count}件）")
            risk_status="❌ ${risk_count}件（ちょうど1つ必要）"
          else
            risk_status="✅ \`${risk_label}\`"
          fi

          if [ "$cost_count" -ne 1 ]; then
            errors+=("cost:* ラベルがちょうど1つ必要です（現在: ${cost_count}件）")
            cost_status="❌ ${cost_count}件（ちょうど1つ必要）"
          else
            cost_status="✅ \`${cost_label}\`"
          fi

          # Strict mode detection
          if [ "$strict_by_cost" = true ]; then
            strict_by_labels=true
          fi

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          strict_by_paths=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(terraform/|\.github/workflows/|scripts/deployment/|scripts/validation/)'; then
            strict_by_paths=true
          fi

          is_strict=false
          strict_reasons=()
          if [ "$strict_by_labels" = true ] || [ "$strict_by_paths" = true ]; then
            is_strict=true
            risk_val=$(echo "$labels_json" | jq -r '.[] | select(. == "risk:medium" or . == "risk:high")' | head -1)
            cost_val=$(echo "$labels_json" | jq -r '.[] | select(. == "cost:medium" or . == "cost:large")' | head -1)
            [ -n "$risk_val" ] && strict_reasons+=("\`${risk_val}\` ラベル")
            [ -n "$cost_val" ] && strict_reasons+=("\`${cost_val}\` ラベル")
            printf '%s\n' "$changed_files" | grep -q '^terraform/'          && strict_reasons+=("\`terraform/**\` 変更")
            printf '%s\n' "$changed_files" | grep -q '^\.github/workflows/' && strict_reasons+=("\`\.github/workflows/**\` 変更")
            printf '%s\n' "$changed_files" | grep -q '^scripts/deployment/' && strict_reasons+=("\`scripts/deployment/**\` 変更")
            printf '%s\n' "$changed_files" | grep -q '^scripts/validation/' && strict_reasons+=("\`scripts/validation/**\` 変更")
          fi

          # Issue link check
          if printf '%s\n' "$PR_BODY" | grep -Eiq '(close[sd]?|fix(e[sd])?|refs?) #[0-9]+'; then
            issue_status="✅ リンクあり"
          else
            errors+=("PR本文にIssueリンクが必要です（例: Closes #123）")
            issue_status="❌ リンクなし（Closes #123 / Fixes #123 / Refs #123 が必要）"
          fi

          # Rollback check
          rollback_status="— 軽運用PRのため不要"
          if [ "$is_strict" = true ]; then
            rollback_content=$(printf '%s\n' "$PR_BODY" | awk '
              /^###[[:space:]]+ロールバック/ || /^##[[:space:]]+ロールバック/ { capture=1; next }
              capture && (/^###[[:space:]]+/ || /^##[[:space:]]+/) { capture=0 }
              capture { print }
            ')

            rollback_text=$(printf '%s\n' "$rollback_content" \
              | sed '/^[[:space:]]*$/d' \
              | sed '/^[[:space:]]*<!--.*-->[[:space:]]*$/d')
            rollback_compact=$(printf '%s\n' "$rollback_text" \
              | sed 's/^[[:space:]]*[-*][[:space:]]*//' \
              | tr -d '[:space:]')

            if [ -z "$rollback_compact" ] || printf '%s' "$rollback_compact" | grep -Eiq '^(なし|不要|no-op|noop|n/a|na)$'; then
              errors+=("厳密運用PRにはロールバック欄への記載が必要です")
              rollback_status="❌ 未記載（厳密運用PRのため必須）"
            else
              rollback_status="✅ 記載あり（厳密運用）"
            fi
          fi

          # --- Write Job Summary ---
          strict_reason_str=""
          for r in "${strict_reasons[@]}"; do
            if [ -n "$strict_reason_str" ]; then
              strict_reason_str="${strict_reason_str}, ${r}"
            else
              strict_reason_str="$r"
            fi
          done

          {
            echo "## PR Policy Check"
            echo ""
            echo "### ラベル"
            echo ""
            echo "| カテゴリ | 結果 |"
            echo "|---|---|"
            echo "| \`type:*\` | $type_status |"
            echo "| \`area:*\` | $area_status |"
            echo "| \`risk:*\` | $risk_status |"
            echo "| \`cost:*\` | $cost_status |"
            echo ""
            echo "### Issue リンク"
            echo ""
            echo "$issue_status"
            echo ""
            echo "### 運用区分"
            echo ""
            if [ "$is_strict" = true ]; then
              echo "**厳密運用**（理由: ${strict_reason_str}）"
            else
              echo "軽運用"
            fi
            echo ""
            echo "### ロールバック"
            echo ""
            echo "$rollback_status"
            echo ""
            echo "---"
            echo ""
            if [ ${#errors[@]} -eq 0 ]; then
              echo "✅ 全チェック通過"
            else
              echo "❌ ${#errors[@]}件の問題があります"
              echo ""
              for err in "${errors[@]}"; do
                echo "- $err"
              done
              echo ""
              echo "修正方法: \`./scripts/github/create-pr-with-labels.sh\` を使ってPRを作成してください"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # --- Exit with error if any checks failed ---
          if [ ${#errors[@]} -gt 0 ]; then
            for err in "${errors[@]}"; do
              echo "::error::$err"
            done
            exit 1
          fi

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run commitlint -- --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npm run commitlint -- --verbose

  backend-check:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build backend
        run: npm run build

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm test -- --runInBand

  frontend-check:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build frontend
        working-directory: ./client
        run: npm run build

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run frontend unit tests
        working-directory: ./client
        run: npm test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Build Docker image
        run: docker build -t hannibal-test .

      - name: Verify non-root user
        run: |
          user=$(docker run --rm hannibal-test whoami)
          echo "Container running as: $user"
          [ "$user" = "node" ] || { echo "::error::Expected 'node' user, got '$user'"; exit 1; }

  terraform-check:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.12.1
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt_check
        run: terraform fmt -check -recursive

      - name: Terraform Init & Validate (all root modules)
        id: validate_dev
        run: |
          set -e
          for dir in terraform/foundation terraform/network terraform/database terraform/service terraform/cdn; do
            echo "--- $dir ---"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

      - name: Write Terraform Check Summary
        if: always()
        env:
          FMT_OUTCOME: ${{ steps.fmt_check.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate_dev.outcome }}
        run: |
          {
            echo "## Terraform Format & Validate"
            echo ""
            echo "| チェック | 結果 |"
            echo "|---|---|"

            if [ "$FMT_OUTCOME" = "success" ]; then
              echo "| \`terraform fmt -check -recursive\` | ✅ 差分なし |"
            elif [ "$FMT_OUTCOME" = "failure" ]; then
              echo "| \`terraform fmt -check -recursive\` | ❌ 差分あり |"
            fi

            if [ "$VALIDATE_OUTCOME" = "success" ]; then
              echo "| \`terraform validate\` | ✅ 問題なし |"
            elif [ "$VALIDATE_OUTCOME" = "failure" ]; then
              echo "| \`terraform validate\` | ❌ エラーあり |"
            elif [ "$VALIDATE_OUTCOME" = "skipped" ]; then
              echo "| \`terraform validate\` | — スキップ |"
            fi

            if [ "$FMT_OUTCOME" = "failure" ]; then
              echo ""
              echo "以下を実行してフォーマットを修正してください:"
              echo ""
              echo '```bash'
              echo "terraform fmt -recursive"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.62.1
          cache: true

      - name: Show TFLint version
        run: tflint --version

      - name: Init TFLint plugins
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --config "$GITHUB_WORKSPACE/.tflint.hcl" --format compact

      - name: Write TFLint summary
        if: success()
        run: |
          {
            echo "## TFLint"
            echo ""
            echo "Terraform lint completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"

  trivy-config:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: '0'
          hide-progress: true
          output: trivy-config.txt
          skip-dirs: docs/worklogs,docs/llm-repo-bundle,client/dist

      - name: Publish Trivy config summary
        if: always()
        run: |
          {
            echo "## Trivy Config Scan"
            echo ""
            echo "Trivy config scans IaC and Dockerfile settings as review signals."
            echo ""
            echo "Initial rollout note: this job currently reports findings without failing the workflow. Required status check promotion is deferred until false positives, runtime, and operational stability are reviewed."
            echo ""
            if [ -s trivy-config.txt ]; then
              echo "<details><summary>Trivy output</summary>"
              echo ""
              echo '```text'
              cat trivy-config.txt
              echo '```'
              echo "</details>"
            else
              echo "No Trivy output was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy config report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-config-${{ github.event.pull_request.number }}
          path: trivy-config.txt
          if-no-files-found: warn
          retention-days: 7

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks git --no-banner --redact --config .gitleaks.toml

      - name: Write Gitleaks summary
        if: success()
        run: |
          {
            echo "## Gitleaks Secret Scan"
            echo ""
            echo "No secrets were detected in the scanned git history."
          } >> "$GITHUB_STEP_SUMMARY"
