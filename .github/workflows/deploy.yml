name: 🚀 Deploy (Simple & Fast)

on:
  workflow_dispatch:

concurrency:
  group: simple-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.0.0
          terraform_wrapper: false

      - name: Assume CICD Role
        run: |
          CREDS=$(aws sts assume-role --role-arn arn:aws:iam::258632448142:role/HannibalCICDRole-Dev --role-session-name deploy)
          echo "AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r '.Credentials.SecretAccessKey')" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo $CREDS | jq -r '.Credentials.SessionToken')" >> $GITHUB_ENV

      # Backend
      - name: Deploy Backend
        run: |
          terraform init
          terraform apply -auto-approve -var="client_url_for_cors=https://hamilcar-hannibal.click"
          terraform output -json > ../tf_outputs_backend.json
        working-directory: ./terraform/backend

      # Frontend
      - name: Deploy Frontend Infrastructure
        run: |
          terraform init
          terraform apply -auto-approve -var="api_alb_dns_name=$(jq -r '.alb_dns_name.value' ../tf_outputs_backend.json)" -var="enable_cloudfront=true"
          terraform output -json > tf_outputs.json
        working-directory: ./terraform/frontend

      # Build & Deploy
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build & Deploy Frontend
        run: |
          cd client
          npm ci
          npm run build
          S3_BUCKET=$(jq -r '.s3_bucket_name.value' ../terraform/frontend/tf_outputs.json)
          aws s3 sync ./dist "s3://$S3_BUCKET" --delete

      - name: Build & Push Docker
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin 258632448142.dkr.ecr.ap-northeast-1.amazonaws.com
          docker build -t nestjs-hannibal-3 .
          docker tag nestjs-hannibal-3:latest 258632448142.dkr.ecr.ap-northeast-1.amazonaws.com/nestjs-hannibal-3:${{ github.sha }}
          docker push 258632448142.dkr.ecr.ap-northeast-1.amazonaws.com/nestjs-hannibal-3:${{ github.sha }}

      - name: Update ECS Service
        run: |
          cd terraform/backend
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          cd ../..
          
          TASK_DEF_ARN=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE --query "services[0].taskDefinition" --output text)
          aws ecs describe-task-definition --task-definition $TASK_DEF_ARN > task-def.json
          
          NEW_IMAGE="258632448142.dkr.ecr.ap-northeast-1.amazonaws.com/nestjs-hannibal-3:${{ github.sha }}"
          NEW_TASK_DEF=$(cat task-def.json | jq --arg IMAGE "$NEW_IMAGE" '
            (.taskDefinition.containerDefinitions[0].image = $IMAGE) | 
            .taskDefinition | 
            {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions, volumes, placementConstraints, requiresCompatibilities, cpu, memory} |
            with_entries(select(.value != null))
          ')
          
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $NEW_TASK_DEF_ARN
          aws ecs wait services-stable --cluster $CLUSTER --services $SERVICE

      - name: Invalidate CloudFront
        run: |
          CF_DIST_ID=$(jq -r '.cloudfront_distribution_id.value' terraform/frontend/tf_outputs.json)
          aws cloudfront create-invalidation --distribution-id "$CF_DIST_ID" --paths "/*"

      - name: 🎉 Complete
        run: echo "🎉 Deployment completed! https://hamilcar-hannibal.click"