# PR Policy Check
# 目的: CONTRIBUTING.md の PR 運用規約（必須ラベル・Issue リンク・厳密運用 PR のロールバック欄）を CI で検証する
# 実体は kmryst/idp-golden-path の reusable workflow（ADR-0008）。
# このファイルはトリガー・permissions・concurrency のみを持つ薄い caller workflow
#
# 厳密運用 path 判定は idp-golden-path 側の既定値（^(\.github/workflows/|scripts/github/|terraform/)）
# をそのまま使う（strict-paths-regex を渡さない）。現行の独自正規表現
# （terraform/ / .github/workflows/ / scripts/deployment/ / scripts/validation/）とは異なり、
# scripts/deployment/ と scripts/validation/ は厳密運用判定から外れ、scripts/github/ が加わる。
# CONTRIBUTING.md の厳密運用定義も同じ内容に更新した（Issue #496、意図した変更）。

name: PR Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

concurrency:
  # idp-golden-path 側の reusable workflow 自身も同名パターンの concurrency group
  # （pr-policy-check-<PR番号>）を持つため、caller 側と同一名にすると
  # 「top level workflow と呼び出し先の間でデッドロック」として GitHub にキャンセルされる
  # （ticket-c2c-platform#294 / idp-golden-path#106参照）。
  # caller 側は `-caller` を付けて callee の group と衝突しないようにする。
  group: pr-policy-check-caller-${{ github.event.pull_request.number }}
  # 実行中 run のキャンセルは CANCELLED check run を commit に残し、
  # required status checks の判定に混入して PR を恒久的にブロックする（Issue #438）。
  cancel-in-progress: false
  # デフォルト（queue: single）は pending run を1つしか保持せず、labeled/unlabeled 連発時に
  # 古い pending run が cancel されて required check が一時的に expected 扱いになるため、
  # pending run を cancel せず FIFO で順次実行する（Issue #485）。
  queue: max

jobs:
  # caller job には name を付けない。job id（pr-policy-check）にフォールバックさせることで、
  # callee側 job 名（PR Policy Check）との完全な文字列重複を避ける（idp-golden-path#106参照）。
  pr-policy-check:
    if: github.actor != 'dependabot[bot]'
    uses: kmryst/idp-golden-path/.github/workflows/pr-policy-check.yml@v1
    permissions:
      contents: read
      pull-requests: read
