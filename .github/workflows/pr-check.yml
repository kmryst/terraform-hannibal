name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.12.1"
  NODE_VERSION: "24"
  POSTGRES_IMAGE: "postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb"
  CURL_IMAGE: "curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13"
  SHELLCHECK_IMAGE: "koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d"
  HADOLINT_IMAGE: "ghcr.io/hadolint/hadolint:v2.14.0@sha256:27086352fd5e1907ea2b934eb1023f217c5ae087992eb59fde121dce9c9ff21e"

jobs:
  backend-check:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build backend
        run: npm run build

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm test -- --runInBand

  frontend-check:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build frontend
        working-directory: ./client
        run: npm run build

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run frontend unit tests
        working-directory: ./client
        run: npm test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Build Docker image
        run: docker build -t hannibal-test .

      - name: Verify non-root user
        run: |
          user=$(docker run --rm hannibal-test whoami)
          echo "Container running as: $user"
          [ "$user" = "node" ] || { echo "::error::Expected 'node' user, got '$user'"; exit 1; }

      - name: Smoke test production startup
        run: |
          set -euo pipefail

          docker network create smoke-test-net

          docker run -d \
            --name smoke-db \
            --network smoke-test-net \
            -e POSTGRES_USER=smoke \
            -e POSTGRES_PASSWORD=smoke \
            -e POSTGRES_DB=smoke \
            "$POSTGRES_IMAGE"

          for attempt in {1..15}; do
            if docker exec smoke-db pg_isready -U smoke -d smoke; then
              break
            fi

            if [ "$attempt" -eq 15 ]; then
              echo "::error::PostgreSQL did not become ready"
              docker logs smoke-db || true
              exit 1
            fi

            sleep 2
          done

          docker run -d \
            --name smoke-app \
            --network smoke-test-net \
            -e NODE_ENV=production \
            -e DATABASE_URL="postgresql://smoke:smoke@smoke-db:5432/smoke?sslmode=disable" \
            hannibal-test

          docker pull "$CURL_IMAGE"

          app_healthy=false
          for attempt in {1..15}; do
            if docker run --rm --network smoke-test-net "$CURL_IMAGE" \
                -sf http://smoke-app:3000/health >/dev/null 2>&1; then
              app_healthy=true
              break
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx smoke-app; then
              echo "::error::Application container exited before health check passed"
              docker logs smoke-app || true
              exit 1
            fi

            sleep 2
          done

          if [ "$app_healthy" != "true" ]; then
            echo "::error::Application did not become healthy"
            docker logs smoke-app || true
            exit 1
          fi

          echo "Production startup smoke test passed."

      - name: Cleanup smoke test containers
        if: always()
        run: |
          docker rm -f smoke-app smoke-db 2>/dev/null || true
          docker network rm smoke-test-net 2>/dev/null || true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Run ShellCheck
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 \
            | xargs -0r docker run --rm \
                -v "$PWD:/repo" \
                -w /repo \
                "$SHELLCHECK_IMAGE"

      - name: Write ShellCheck summary
        if: success()
        run: |
          {
            echo "## ShellCheck"
            echo ""
            echo "Shell script lint completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Run Hadolint
        run: docker run --rm -v "$PWD:/repo" -w /repo "$HADOLINT_IMAGE" hadolint --config .hadolint.yaml Dockerfile

      - name: Write Hadolint summary
        if: success()
        run: |
          {
            echo "## Hadolint"
            echo ""
            echo "Dockerfile lint completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"

  terraform-check:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.12.1
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt_check
        run: terraform fmt -check -recursive

      - name: Terraform Init & Validate (all root modules)
        id: validate_dev
        run: |
          set -e
          for dir in terraform/foundation terraform/network terraform/database terraform/service terraform/cdn; do
            echo "--- $dir ---"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

      - name: Write Terraform Check Summary
        if: always()
        env:
          FMT_OUTCOME: ${{ steps.fmt_check.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate_dev.outcome }}
        run: |
          {
            echo "## Terraform Format & Validate"
            echo ""
            echo "| チェック | 結果 |"
            echo "|---|---|"

            if [ "$FMT_OUTCOME" = "success" ]; then
              echo "| \`terraform fmt -check -recursive\` | ✅ 差分なし |"
            elif [ "$FMT_OUTCOME" = "failure" ]; then
              echo "| \`terraform fmt -check -recursive\` | ❌ 差分あり |"
            fi

            if [ "$VALIDATE_OUTCOME" = "success" ]; then
              echo "| \`terraform validate\` | ✅ 問題なし |"
            elif [ "$VALIDATE_OUTCOME" = "failure" ]; then
              echo "| \`terraform validate\` | ❌ エラーあり |"
            elif [ "$VALIDATE_OUTCOME" = "skipped" ]; then
              echo "| \`terraform validate\` | — スキップ |"
            fi

            if [ "$FMT_OUTCOME" = "failure" ]; then
              echo ""
              echo "以下を実行してフォーマットを修正してください:"
              echo ""
              echo '```bash'
              echo "terraform fmt -recursive"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: v0.62.1
          cache: true

      - name: Show TFLint version
        run: tflint --version

      - name: Init TFLint plugins
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --config "$GITHUB_WORKSPACE/.tflint.hcl" --format compact

      - name: Write TFLint summary
        if: success()
        run: |
          {
            echo "## TFLint"
            echo ""
            echo "Terraform lint completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"

  trivy-config:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: '0'
          hide-progress: true
          output: trivy-config.txt
          skip-dirs: docs/worklogs,docs/llm-repo-bundle,client/dist

      - name: Publish Trivy config summary
        if: always()
        run: |
          {
            echo "## Trivy Config Scan"
            echo ""
            echo "Trivy config scans IaC and Dockerfile settings as review signals."
            echo ""
            echo "Initial rollout note: this job currently reports findings without failing the workflow. Required status check promotion is deferred until false positives, runtime, and operational stability are reviewed."
            echo ""
            if [ -s trivy-config.txt ]; then
              echo "<details><summary>Trivy output</summary>"
              echo ""
              echo '```text'
              cat trivy-config.txt
              echo '```'
              echo "</details>"
            else
              echo "No Trivy output was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy config report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-config-${{ github.event.pull_request.number }}
          path: trivy-config.txt
          if-no-files-found: warn
          retention-days: 7

  # Gitleaks Secret Scan は .github/workflows/gitleaks-secret-scan.yml に切り出した
  # （idp-golden-path の reusable workflow 化、Issue #497 / ADR-0008）。
