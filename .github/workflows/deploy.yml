name: Deploy NestJS Hannibal

env:
  PROJECT_NAME: "nestjs-hannibal-3"
  TERRAFORM_VERSION: "1.12.1"
  NODE_VERSION: "24"

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: "canary/bluegreenはCodeDeploy実行、provisioningは初回構築専用（CodeDeployなし）"
        required: true
        default: "canary"
        type: choice
        options:
          - canary         # 1回目以降（CodeDeploy Canary段階的切替）
          - bluegreen      # 1回目以降（CodeDeploy Blue/Green切替）
          - provisioning   # 0回目（初期構築専用・CodeDeployなし）

jobs:
  deploy:
    # 品質保証は PR gate（pr-check.yml）に一本化する。
    # deploy.yml は branch protection を通過した main の手動実行を前提とし、backend/frontend test はここでは再実行しない。
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # GitHub OIDC トークン発行に必須
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
          jq --version

      - name: Validate deployment mode
        env:
          DEPLOYMENT_MODE: ${{ inputs.deployment_mode }}
        run: |
          set -euo pipefail

          CLUSTER_NAME="${PROJECT_NAME}-cluster"
          SERVICE_NAME="${PROJECT_NAME}-api-service"

          {
            echo "## Deployment mode"
            echo ""
            echo "- Selected mode: \`${DEPLOYMENT_MODE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$DEPLOYMENT_MODE" != "provisioning" ]; then
            {
              echo "- CodeDeploy: will run the \`${DEPLOYMENT_MODE}\` deployment step."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "- CodeDeploy: will not run in provisioning mode."
            echo "- Provisioning is only allowed when the ECS service does not already exist."
          } >> "$GITHUB_STEP_SUMMARY"

          set +e
          SERVICE_JSON=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --output json 2>ecs-describe-services-error.log)
          DESCRIBE_EXIT=$?
          set -e

          if [ "$DESCRIBE_EXIT" -ne 0 ]; then
            if grep -q "ClusterNotFoundException" ecs-describe-services-error.log; then
              {
                echo "- ECS service guard: cluster not found. Treating this as initial provisioning."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            cat ecs-describe-services-error.log >&2
            echo "::error::Failed to inspect ECS service before provisioning."
            {
              echo "- ECS service guard: failed to inspect the service. Stopping to avoid unsafe provisioning."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          SERVICE_STATUS=$(echo "$SERVICE_JSON" | jq -r '.services[0].status // "MISSING"')
          FAILURE_REASON=$(echo "$SERVICE_JSON" | jq -r '.failures[0].reason // ""')

          if [ "$SERVICE_STATUS" = "ACTIVE" ] || [ "$SERVICE_STATUS" = "DRAINING" ]; then
            echo "::error::ECS service $SERVICE_NAME is $SERVICE_STATUS. Use canary or bluegreen instead of provisioning."
            {
              echo "- ECS service guard: \`${SERVICE_NAME}\` is \`${SERVICE_STATUS}\`."
              echo "- Result: provisioning is blocked for an existing environment. Use \`canary\` or \`bluegreen\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ "$SERVICE_STATUS" = "INACTIVE" ] || [ "$SERVICE_STATUS" = "MISSING" ] || [ "$FAILURE_REASON" = "MISSING" ]; then
            {
              echo "- ECS service guard: service status is \`${SERVICE_STATUS}\`."
              echo "- Result: provisioning is allowed."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::error::Unexpected ECS service status '$SERVICE_STATUS'. Stopping to avoid unsafe provisioning."
          {
            echo "- ECS service guard: unexpected service status \`${SERVICE_STATUS}\`."
            echo "- Result: provisioning is blocked until the service state is reviewed."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: Verify Terraform installation
        run: |
          terraform version
          which terraform

      # aws_s3_object の fileset 用。空 dist で apply すると state 上のオブジェクトが消えるため、Terraform より前にビルドする
      - name: Setup Node.js for frontend build
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build frontend (client/dist for Terraform)
        run: |
          set -e
          cd client
          echo "VITE_GRAPHQL_ENDPOINT=/graphql" > .env.production
          npm ci
          npm run build

      - name: Deploy Infrastructure (network)
        working-directory: ./terraform/network
        run: |
          set -e
          terraform init -input=false
          terraform plan \
            -var="environment=dev" \
            -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Deploy Infrastructure (database)
        working-directory: ./terraform/database
        run: |
          set -e
          terraform init -input=false
          terraform plan \
            -var="environment=dev" \
            -var="db_name=nestjs_hannibal_db" \
            -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Deploy Infrastructure (service)
        working-directory: ./terraform/service
        run: |
          set -e
          terraform init -input=false

          DEPLOYMENT_TYPE="${{ inputs.deployment_mode }}"
          if [ "$DEPLOYMENT_TYPE" = "provisioning" ]; then
            DEPLOYMENT_TYPE="canary"
          fi

          terraform plan \
            -var="client_url_for_cors=https://hamilcar-hannibal.click" \
            -var="environment=dev" \
            -var="deployment_type=$DEPLOYMENT_TYPE" \
            -var="ecr_repository_url=${{ vars.ECR_REPOSITORY_URL }}" \
            -var="alb_certificate_arn=${{ vars.ALB_CERTIFICATE_ARN }}" \
            -var="db_name=nestjs_hannibal_db" \
            -out=tfplan
          terraform apply -auto-approve tfplan

          echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> $GITHUB_ENV

      # terraform/observability(Game Day用FIS実験テンプレート)は本体のコンテナデプロイ経路
      # (network/database/service/cdn)から独立したroot moduleに分離している(Issue #458)。
      # continue-on-error: true により、ここで失敗しても後続のDockerビルド/push・
      # CodeDeployデプロイはブロックされない。blast radius分離の詳細はADR-0029を参照。
      - name: Deploy Infrastructure (observability)
        id: deploy_observability
        working-directory: ./terraform/observability
        continue-on-error: true
        run: |
          set -e
          terraform init -input=false
          terraform plan \
            -var="environment=dev" \
            -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Warn if observability deploy failed
        if: steps.deploy_observability.outcome == 'failure'
        run: |
          {
            echo "## :warning: Observability (Game Day FIS) deploy failed"
            echo ""
            echo "\`terraform/observability\` failed to apply. This does NOT affect the core service deployment (network/database/service/cdn), which is intentionally decoupled (Issue #458)."
            echo "The Game Day exercise (\`scripts/game-day/run-ecs-task-stop-experiment.sh\`) will not work until this is fixed."
            echo "Check the \"Deploy Infrastructure (observability)\" step logs above, fix the issue, and either re-run this workflow or apply \`terraform/observability\` manually."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy Infrastructure (cdn)
        working-directory: ./terraform/cdn
        run: |
          set -e
          terraform init -input=false

          terraform plan \
            -var="enable_cloudfront=true" \
            -var="acm_certificate_arn_us_east_1=${{ vars.ACM_CERTIFICATE_ARN_US_EAST_1 }}" \
            -var="hosted_zone_id=${{ vars.HOSTED_ZONE_ID }}" \
            -out=tfplan
          terraform apply -auto-approve tfplan

          echo "S3_BUCKET=$(terraform output -raw s3_bucket_name)" >> $GITHUB_ENV
          echo "CLOUDFRONT_ARN=$(terraform output -raw cloudfront_distribution_arn)" >> $GITHUB_ENV

      - name: Sync frontend to S3 and invalidate CloudFront
        run: |
          set -e
          aws s3 sync client/dist/ "s3://${S3_BUCKET}/" --delete

          if [ -n "${CLOUDFRONT_ARN}" ]; then
            CLOUDFRONT_ID=$(echo "${CLOUDFRONT_ARN}" | cut -d'/' -f2)
            aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_ID" --paths "/*"
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      # 方式A: SHAタグとlatestタグの両方をPush（0回目でもlatestをPull可能にする）
      - name: Build and Push ECS Image
        run: |
          set -e
          REPO="${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}"
          IMAGE_SHA_TAG="$REPO:${{ github.sha }}"
          IMAGE_LATEST_TAG="$REPO:latest"

          echo "🐳 Building Docker image: $IMAGE_SHA_TAG"
          docker build -t "$IMAGE_SHA_TAG" .

          echo "🔖 Tagging also as: $IMAGE_LATEST_TAG"
          docker tag "$IMAGE_SHA_TAG" "$IMAGE_LATEST_TAG"

          echo "📤 Pushing SHA tag..."
          docker push "$IMAGE_SHA_TAG"

          echo "📤 Pushing latest tag..."
          docker push "$IMAGE_LATEST_TAG"

          echo "NEW_IMAGE=$IMAGE_SHA_TAG" >> $GITHUB_ENV
          echo "✅ Docker image pushed with SHA and latest tags"

      - name: Generate AppSpec for ECS CodeDeploy
        if: ${{ inputs.deployment_mode != 'provisioning' }}
        run: |
          set -e
          aws ecs describe-task-definition \
            --task-definition "${{ env.PROJECT_NAME }}-api-task" \
            --query 'taskDefinition' > current_task_def.json
          CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' current_task_def.json)
          CONTAINER_PORT=$(jq -r '.containerDefinitions[0].portMappings[0].containerPort' current_task_def.json)
          jq --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .placementConstraints,
                 .compatibilities, .registeredAt, .registeredBy)' \
            current_task_def.json > new_task_def.json
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new_task_def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV
          cat > appspec.yaml << EOF
          version: 0.0
          Resources:
            - TargetService:
                Type: AWS::ECS::Service
                Properties:
                  TaskDefinition: $NEW_TASK_DEF_ARN
                  LoadBalancerInfo:
                    ContainerName: "$CONTAINER_NAME"
                    ContainerPort: $CONTAINER_PORT
          EOF

      - name: Deploy with CodeDeploy Blue/Green
        if: ${{ inputs.deployment_mode == 'bluegreen' }}
        run: |
          set -e
          S3_BUCKET="${{ env.PROJECT_NAME }}-codedeploy-artifacts"
          S3_KEY="appspec-${{ github.sha }}.yaml"
          aws s3 cp appspec.yaml "s3://$S3_BUCKET/$S3_KEY"
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${{ env.PROJECT_NAME }}-app" \
            --deployment-group-name "${{ env.PROJECT_NAME }}-dg" \
            --s3-location bucket="$S3_BUCKET",key="$S3_KEY",bundleType="YAML" \
            --query 'deploymentId' --output text)
          echo "🚀 CodeDeploy Blue/Green deployment started: $DEPLOYMENT_ID"
          aws deploy wait deployment-successful --deployment-id "$DEPLOYMENT_ID"
          echo "✅ Blue/Green deployment finished"

      - name: Deploy with CodeDeploy Canary
        if: ${{ inputs.deployment_mode == 'canary' }}
        run: |
          set -e
          S3_BUCKET="${{ env.PROJECT_NAME }}-codedeploy-artifacts"
          S3_KEY="appspec-${{ github.sha }}.yaml"
          aws s3 cp appspec.yaml "s3://$S3_BUCKET/$S3_KEY"
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${{ env.PROJECT_NAME }}-app" \
            --deployment-group-name "${{ env.PROJECT_NAME }}-dg" \
            --s3-location bucket="$S3_BUCKET",key="$S3_KEY",bundleType="YAML" \
            --query 'deploymentId' --output text)
          echo "🔍 CodeDeploy Canary deployment started: $DEPLOYMENT_ID"
          echo "📊 Phase 1: 10% traffic to new version (5 minutes monitoring)"
          echo "📊 Phase 2: 100% traffic if no alarms triggered"
          echo "📊 Monitor: https://console.aws.amazon.com/codesuite/codedeploy/deployments/$DEPLOYMENT_ID"
          aws deploy wait deployment-successful --deployment-id "$DEPLOYMENT_ID"
          echo "✅ Canary deployment finished successfully!"

      - name: Cleanup old task definition revisions
        if: ${{ inputs.deployment_mode != 'provisioning' }}
        # ECRライフサイクルポリシーが直近10イメージを保持するため、タスク定義も10世代に揃える
        run: |
          set -e
          FAMILY="${{ env.PROJECT_NAME }}-api-task"
          KEEP=10

          ALL_ARNS=()
          NEXT_TOKEN=""
          while true; do
            if [ -z "$NEXT_TOKEN" ]; then
              RESULT=$(aws ecs list-task-definitions \
                --family-prefix "$FAMILY" \
                --sort DESC \
                --output json)
            else
              RESULT=$(aws ecs list-task-definitions \
                --family-prefix "$FAMILY" \
                --sort DESC \
                --next-token "$NEXT_TOKEN" \
                --output json)
            fi
            while IFS= read -r ARN; do
              ALL_ARNS+=("$ARN")
            done < <(echo "$RESULT" | jq -r '.taskDefinitionArns[]')
            NEXT_TOKEN=$(echo "$RESULT" | jq -r '.nextToken // empty')
            [ -z "$NEXT_TOKEN" ] && break
          done

          TOTAL=${#ALL_ARNS[@]}
          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "✅ ${TOTAL} 世代のため cleanup 不要（保持上限: ${KEEP}）"
          else
            OLD_COUNT=$((TOTAL - KEEP))
            echo "🗑️ ${OLD_COUNT} 件の古いリビジョンを deregister します（${TOTAL} → ${KEEP} 世代）"
            for i in $(seq "$KEEP" $((TOTAL - 1))); do
              aws ecs deregister-task-definition \
                --task-definition "${ALL_ARNS[$i]}" \
                --query 'taskDefinition.taskDefinitionArn' --output text
            done
            echo "✅ Cleanup complete"
          fi
