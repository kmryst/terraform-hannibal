name: Destroy AWS Infrastructure (Reliable)

env:
  PROJECT_NAME: "nestjs-hannibal-3"
  TERRAFORM_VERSION: "1.12.1"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'
    permissions:
      id-token: write   # GitHub OIDC гғҲгғјгӮҜгғізҷәиЎҢгҒ«еҝ…й Ҳ
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq unzip

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Stop active CodeDeploy deployments
        run: |
          set -e
          APP_NAME="${{ env.PROJECT_NAME }}-app"
          echo "рҹ”Һ Listing active deployments for $APP_NAME"
          DEPLOYMENTS=$(aws deploy list-deployments \
            --application-name "$APP_NAME" \
            --include-only-statuses InProgress Queued Ready \
            2>/dev/null || echo '{"deployments":[]}')
          CNT=$(echo "$DEPLOYMENTS" | jq -r '.deployments | length')
          if [ "$CNT" -gt 0 ]; then
            for id in $(echo "$DEPLOYMENTS" | jq -r '.deployments[]'); do
              echo "рҹӣ‘ Stopping deployment: $id"
              aws deploy stop-deployment --deployment-id "$id" --auto-rollback-enabled || true
            done
          else
            echo "вң… No active deployments"
          fi

      - name: Scale down ECS service and wait stable
        run: |
          set -e
          CLUSTER="${{ env.PROJECT_NAME }}-cluster"
          SERVICE="${{ env.PROJECT_NAME }}-api-service"
          echo "рҹ”§ Scaling down ECS service $SERVICE in $CLUSTER to 0"
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --desired-count 0 || true

          echo "вҸі Waiting for ECS service to become stable (0 desired)..."
          ATTEMPTS=10
          for i in $(seq 1 $ATTEMPTS); do
            STATUS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[].deployments[].desiredCount' --output text 2>/dev/null || echo "Unknown")
            echo "Attempt $i/$ATTEMPTS: desiredCount=$STATUS"
            if [ "$STATUS" = "0" ] || [ "$STATUS" = "None" ] || [ "$STATUS" = "Unknown" ]; then
              break
            fi
            sleep 30
          done
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE" || true
          echo "вң… ECS service scaled down or stable"

      # terraform/observability(Game Dayз”ЁFISе®ҹйЁ“гғҶгғігғ—гғ¬гғјгғҲ)гҒҜterraform/serviceгҒ«дҫқеӯҳгҒҷгӮӢгҒҹгӮҒгҖҒ
      # serviceгӮ’destroyгҒҷгӮӢеүҚгҒ«з ҙжЈ„гҒҷгӮӢгҖӮcontinue-on-error: trueгҒ«гӮҲгӮҠгҖҒгҒ“гҒ“гҒҢеӨұж•—гҒ—гҒҰгӮӮ
      # гӮігӮ№гғҲеҪұйҹҝгҒ®гҒӮгӮӢcdn/service/database/networkгҒ®destroyгҒҜгғ–гғӯгғғгӮҜгҒ•гӮҢгҒӘгҒ„(Issue #458)гҖӮ
      - name: Destroy Infrastructure (observability)
        working-directory: ./terraform/observability
        continue-on-error: true
        run: |
          set -e
          terraform init -input=false
          terraform destroy -auto-approve -var="environment=dev"

      - name: Destroy Infrastructure (cdn)
        working-directory: ./terraform/cdn
        run: |
          set -e
          terraform init -input=false
          terraform destroy -auto-approve \
            -var="enable_cloudfront=true" \
            -var="acm_certificate_arn_us_east_1=${{ vars.ACM_CERTIFICATE_ARN_US_EAST_1 }}" \
            -var="hosted_zone_id=${{ vars.HOSTED_ZONE_ID }}"

      - name: Destroy Infrastructure (service)
        working-directory: ./terraform/service
        run: |
          set -e
          terraform init -input=false
          terraform destroy -auto-approve \
            -var="client_url_for_cors=" \
            -var="environment=dev" \
            -var="deployment_type=canary" \
            -var="ecr_repository_url=${{ vars.ECR_REPOSITORY_URL }}" \
            -var="alb_certificate_arn=${{ vars.ALB_CERTIFICATE_ARN }}" \
            -var="db_name=nestjs_hannibal_db"

      - name: Destroy Infrastructure (database)
        working-directory: ./terraform/database
        run: |
          set -e
          terraform init -input=false
          terraform destroy -auto-approve \
            -var="environment=dev" \
            -var="db_name=nestjs_hannibal_db"

      - name: Destroy Infrastructure (network)
        working-directory: ./terraform/network
        run: |
          set -e
          terraform init -input=false
          terraform destroy -auto-approve \
            -var="environment=dev"

      - name: Cleanup S3 buckets (best-effort)
        run: |
          set -e
          # codedeploy-artifacts: Terraform гҒ§з®ЎзҗҶгғ»destroy гҒ§ж¶ҲгҒҲгӮӢгҒҢгҖҒж®ӢгҒЈгҒҰгҒ„гӮӢгӮӘгғ–гӮёгӮ§гӮҜгғҲгӮ’е…ҲгҒ«еүҠйҷӨгҒ—гҒҰгҒҠгҒҸ
          aws s3 rm s3://${{ env.PROJECT_NAME }}-codedeploy-artifacts --recursive || true
          # гғ•гғӯгғігғҲз”ЁгғҗгӮұгғғгғҲжң¬дҪ“гҒҜжүӢеӢ•дҪңжҲҗгғ»ж°ёз¶ҡпјҲdata еҸӮз…§пјүгҒӘгҒ®гҒ§гғҗгӮұгғғгғҲеүҠйҷӨгҒҜгҒ—гҒӘгҒ„гҖӮгӮӘгғ–гӮёгӮ§гӮҜгғҲгҒ®гҒҝжҺғйҷӨ
          aws s3 rm s3://${{ env.PROJECT_NAME }}-frontend --recursive || true

      - name: Cleanup ECR images (best-effort)
        run: |
          set -e
          REPO="${{ env.PROJECT_NAME }}"
          aws ecr batch-delete-image --repository-name "$REPO" --image-ids imageTag=latest || true
          IDS=$(aws ecr list-images --repository-name "$REPO" --query 'imageIds' --output json 2>/dev/null || echo "[]")
          if [ "$(echo "$IDS" | jq 'length')" -gt 0 ]; then
            echo "$IDS" | aws ecr batch-delete-image --repository-name "$REPO" --image-ids file:///dev/stdin || true
          fi

      - name: Final ELB/TG cleanup (best-effort)
        run: |
          set -e
          ALB_ARN=$(aws elbv2 describe-load-balancers --names ${{ env.PROJECT_NAME }}-alb \
            --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "None")
          if [ "$ALB_ARN" != "None" ]; then
            aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
              --query 'Listeners[*].ListenerArn' --output text 2>/dev/null | \
              xargs -n1 aws elbv2 delete-listener --listener-arn || true
            aws elbv2 delete-load-balancer --load-balancer-arn "$ALB_ARN" || true
            sleep 20
          fi
          for tg in "${{ env.PROJECT_NAME }}-blue-tg" "${{ env.PROJECT_NAME }}-green-tg"; do
            TG_ARN=$(aws elbv2 describe-target-groups --names "$tg" \
              --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "None")
            if [ "$TG_ARN" != "None" ]; then
              aws elbv2 delete-target-group --target-group-arn "$TG_ARN" || true
            fi
          done

      - name: Summary
        run: |
          echo "вң… Destroy workflow completed."
          echo "- CodeDeploy deployments stopped"
          echo "- ECS service scaled down and waited stable"
          echo "- Terraform destroy (observability вҶ’ cdn вҶ’ service вҶ’ database вҶ’ network) executed"
          echo "- Best-effort cleanup for S3/ECR/ELB/TG finished"
