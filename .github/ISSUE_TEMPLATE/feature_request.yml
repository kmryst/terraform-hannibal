name: Feature Request
description: 新機能/改善の要望チケット
title: '短い要約（例: READMEにGitHub運用導線を追加）'
body:
  - type: markdown
    attributes:
      value: |
        Web UI から起票する場合も、最小本文項目と必須4ラベル (`type / area / risk / cost`) をこのフォームで揃えます。

  - type: dropdown
    id: type
    attributes:
      label: type
      description: 変更の主題を1つ選んでください。
      options:
        - type:feature
        - type:bug
        - type:docs
        - type:infra
        - type:chore
        - type:refactor
        - type:test
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: area
      description: |
        主に影響する領域を選んでください（1つ以上、複数可）。
        area:docs = ドキュメント関連
        area:ci-cd = GitHub Actions / CI
        area:infra = Terraform / AWS 基盤
        area:backend = NestJS / API
        area:frontend = React / UI
        area:database = PostgreSQL / TypeORM
      multiple: true
      options:
        - area:docs
        - area:ci-cd
        - area:infra
        - area:backend
        - area:frontend
        - area:database
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: risk
      description: |
        変更の危険度を1つ選んでください。
        risk:low = 低リスク・影響範囲小・ロールバック容易
        risk:medium = 要注意・変更範囲や確認項目が増える
        risk:high = 高リスク・慎重な確認や戻し方の検討が必要
      options:
        - risk:low
        - risk:medium
        - risk:high
    validations:
      required: true

  - type: dropdown
    id: cost
    attributes:
      label: cost
      description: |
        コスト影響を1つ選んでください。
        cost:none = コスト影響なし
        cost:small = 小
        cost:medium = 中
        cost:large = 大
      options:
        - cost:none
        - cost:small
        - cost:medium
        - cost:large
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: 目的
      description: なぜ必要かを簡潔に書いてください。
      placeholder: 例) GitHub運用ルールへの導線を README に追加したい
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: 対象
      description: 主に何を変更するかを書いてください。
      placeholder: 例) README.md と CONTRIBUTING.md
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: この Issue を close できる状態を書いてください。
      placeholder: |
        例)
        - README に導線が追加されている
        - 関連ドキュメントの表現が揃っている
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 必要な場合だけ使ってください。
      placeholder: 既知の制約、代替案、関連URLなど
    validations:
      required: false
