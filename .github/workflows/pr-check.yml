name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
    branches: [main]

env:
  AWS_ACCOUNT_ID: "258632448142"
  AWS_REGION: "ap-northeast-1"
  TERRAFORM_VERSION: "1.12.1"
  NODE_VERSION: "20"

jobs:
  pr-policy-check:
    name: PR Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require linked issue and mandatory labels
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          counts=$(python3 - <<'PY'
          import json
          import os

          labels = json.loads(os.environ["PR_LABELS_JSON"])

          def count(prefix: str) -> int:
              return sum(1 for label in labels if label["name"].startswith(prefix))

          print(count("type:"))
          print(count("area:"))
          print(count("risk:"))
          print(count("cost:"))
          print("true" if any(label["name"] in {"risk:medium", "risk:high"} for label in labels) else "false")
          print("true" if any(label["name"] in {"cost:medium", "cost:large"} for label in labels) else "false")
          PY
          )

          type_count=$(printf '%s\n' "$counts" | sed -n '1p')
          area_count=$(printf '%s\n' "$counts" | sed -n '2p')
          risk_count=$(printf '%s\n' "$counts" | sed -n '3p')
          cost_count=$(printf '%s\n' "$counts" | sed -n '4p')
          strict_by_labels=$(printf '%s\n' "$counts" | sed -n '5p')
          strict_by_cost=$(printf '%s\n' "$counts" | sed -n '6p')

          if [ "$type_count" -ne 1 ]; then
            echo "::error::PR must have exactly one type:* label. Use ./scripts/github/create-pr-with-labels.sh to create PRs with the required labels."
            exit 1
          fi

          if [ "$area_count" -lt 1 ]; then
            echo "::error::PR must have at least one area:* label. Use ./scripts/github/create-pr-with-labels.sh to create PRs with the required labels."
            exit 1
          fi

          if [ "$risk_count" -ne 1 ]; then
            echo "::error::PR must have exactly one risk:* label. Use ./scripts/github/create-pr-with-labels.sh to create PRs with the required labels."
            exit 1
          fi

          if [ "$cost_count" -ne 1 ]; then
            echo "::error::PR must have exactly one cost:* label. Use ./scripts/github/create-pr-with-labels.sh to create PRs with the required labels."
            exit 1
          fi

          strict_by_paths=false

          if [ "$strict_by_cost" = true ]; then
            strict_by_labels=true
          fi

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if printf '%s\n' "$changed_files" | grep -Eq '^(terraform/|\.github/workflows/|scripts/deployment/|scripts/validation/)'; then
            strict_by_paths=true
          fi

          if printf '%s\n' "$PR_BODY" | grep -Eiq '(close[sd]?|fix(e[sd])?|refs?) #[0-9]+'; then
            echo "Linked issue found."
          else
            echo "::error::PR body must include a linked issue, for example: Closes #123, Fixes #123, or Refs #123. ./scripts/github/create-pr-with-labels.sh appends Closes #<issue番号> automatically."
            exit 1
          fi

          if [ "$strict_by_labels" = true ] || [ "$strict_by_paths" = true ]; then
            rollback_content=$(printf '%s\n' "$PR_BODY" | awk '
              /^###[[:space:]]+ロールバック/ || /^##[[:space:]]+ロールバック/ { capture=1; next }
              capture && (/^###[[:space:]]+/ || /^##[[:space:]]+/) { capture=0 }
              capture { print }
            ')

            rollback_text=$(printf '%s\n' "$rollback_content" \
              | sed '/^[[:space:]]*$/d' \
              | sed '/^[[:space:]]*<!--.*-->[[:space:]]*$/d')
            rollback_compact=$(printf '%s\n' "$rollback_text" \
              | sed 's/^[[:space:]]*[-*][[:space:]]*//' \
              | tr -d '[:space:]')

            if [ -z "$rollback_compact" ] || printf '%s' "$rollback_compact" | grep -Eiq '^(なし|不要|no-op|noop|n/a|na)$'; then
              echo "::error::Strict PRs must include a substantive rollback section."
              exit 1
            fi
          fi

  backend-check:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build backend
        run: npm run build

  frontend-check:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build frontend
        working-directory: ./client
        run: npm run build

  terraform-check:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (dev)
        working-directory: ./terraform/environments/dev
        run: terraform init -backend=false

      - name: Terraform Validate (dev)
        working-directory: ./terraform/environments/dev
        run: terraform validate

  terraform-plan-changes:
    name: Terraform Plan Change Detection
    runs-on: ubuntu-latest
    outputs:
      terraform_changed: ${{ steps.detect.outputs.terraform_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect terraform changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if printf '%s\n' "$changed_files" | grep -Eq '^terraform/'; then
            echo "terraform_changed=true" >> "$GITHUB_OUTPUT"
            echo "Terraform changes detected."
          else
            echo "terraform_changed=false" >> "$GITHUB_OUTPUT"
            echo "No terraform changes detected."
          fi

  terraform-plan:
    name: Terraform Plan Artifact
    runs-on: ubuntu-latest
    needs: terraform-plan-changes
    if: needs.terraform-plan-changes.outputs.terraform_changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      id-token: write
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # aws_s3_object の fileset 用。plan 前に client/dist を用意する。
      - name: Setup Node.js for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build frontend (client/dist for Terraform)
        run: |
          set -e
          cd client
          echo "VITE_GRAPHQL_ENDPOINT=/graphql" > .env.production
          npm ci
          npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials for PR plan
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/HannibalPRPlanRole-Dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (dev backend)
        working-directory: ./terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Plan (dev)
        id: terraform_plan
        working-directory: ./terraform/environments/dev
        run: |
          set +e
          terraform plan \
            -refresh=true \
            -lock=false \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -out=tfplan \
            -var="client_url_for_cors=https://hamilcar-hannibal.click" \
            -var="environment=dev" \
            -var="deployment_type=canary" \
            -var="enable_cloudfront=true" \
            > terraform-plan.txt 2>&1
          plan_exit=$?
          set -e

          echo "$plan_exit" > terraform-plan-exitcode.txt

          if [ "$plan_exit" -eq 0 ] || [ "$plan_exit" -eq 2 ]; then
            terraform show -json tfplan > terraform-plan.json 2> terraform-plan-json-error.txt || true
          fi

          if [ "$plan_exit" -eq 0 ]; then
            echo "plan_status=no_changes" >> "$GITHUB_OUTPUT"
            echo "Terraform plan completed with no changes."
          elif [ "$plan_exit" -eq 2 ]; then
            echo "plan_status=changes" >> "$GITHUB_OUTPUT"
            echo "Terraform plan completed with changes. This is expected for a destroyed dev environment."
          else
            echo "plan_status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Terraform plan failed. Check the uploaded terraform-plan-dev artifact and job logs."
            exit "$plan_exit"
          fi

      - name: Upload Terraform plan text artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-${{ github.event.pull_request.number }}
          path: |
            terraform/environments/dev/terraform-plan.txt
            terraform/environments/dev/terraform-plan-exitcode.txt
          if-no-files-found: warn
          retention-days: 3

      - name: Analyze Terraform plan review signals
        if: always()
        working-directory: ./terraform/environments/dev
        run: |
          set -e

          if [ ! -s terraform-plan.json ]; then
            {
              echo "### Review Signals"
              echo
              echo "Structured plan analysis was not available. Check the plan artifact and job logs."
            } > terraform-plan-signals.md
            exit 0
          fi

          python3 <<'PY'
          import json
          from collections import defaultdict
          from pathlib import Path

          with open("terraform-plan.json", encoding="utf-8") as f:
              plan = json.load(f)

          categories = {
              "destroy": "Destroy actions",
              "replace": "Replace actions",
              "iam": "IAM / OIDC / permission boundary changes",
              "security_group_ingress": "Security group ingress changes",
              "public_access": "Public access / external exposure changes",
              "edge_data": "Route53 / CloudFront / RDS changes",
          }

          matches = defaultdict(list)
          resource_changes = plan.get("resource_changes", [])

          def actions_for(change):
              return change.get("change", {}).get("actions", [])

          def has_change(change):
              actions = actions_for(change)
              return actions and actions != ["no-op"]

          def before_after_changed(change, key):
              body = change.get("change", {})
              before = body.get("before") or {}
              after = body.get("after") or {}
              return before.get(key) != after.get(key)

          def add(category, change, reason):
              actions = "/".join(actions_for(change)) or "unknown"
              address = change.get("address", "unknown")
              rtype = change.get("type", "unknown")
              matches[category].append(f"- `{address}` ({rtype}, actions: `{actions}`): {reason}")

          for change in resource_changes:
              if not has_change(change):
                  continue

              actions = actions_for(change)
              action_set = set(actions)
              rtype = change.get("type", "")
              address = change.get("address", "")
              name = change.get("name", "")
              combined = f"{rtype} {address} {name}".lower()

              if "delete" in action_set and action_set != {"create", "delete"}:
                  add("destroy", change, "resource will be destroyed")

              if action_set == {"create", "delete"}:
                  add("replace", change, "resource will be replaced")

              if rtype.startswith("aws_iam_") or rtype == "aws_organizations_policy" or "openid_connect" in rtype:
                  add("iam", change, "IAM/OIDC related resource changed")
              elif before_after_changed(change, "permissions_boundary") or "permission_boundary" in combined:
                  add("iam", change, "permission boundary related change")

              if rtype in {"aws_vpc_security_group_ingress_rule", "aws_security_group_rule"}:
                  body = change.get("change", {})
                  before = body.get("before") or {}
                  after = body.get("after") or {}
                  rule_type = after.get("type", before.get("type"))
                  if rtype == "aws_vpc_security_group_ingress_rule" or rule_type == "ingress":
                      add("security_group_ingress", change, "security group ingress rule changed")
              elif rtype == "aws_security_group" and before_after_changed(change, "ingress"):
                  add("security_group_ingress", change, "security group ingress block changed")

              if rtype in {
                  "aws_s3_bucket_policy",
                  "aws_s3_bucket_acl",
                  "aws_s3_bucket_public_access_block",
                  "aws_s3_bucket_website_configuration",
                  "aws_lb",
                  "aws_lb_listener",
                  "aws_apigatewayv2_api",
                  "aws_apigatewayv2_route",
                  "aws_apigatewayv2_stage",
              } or "public_access" in combined:
                  add("public_access", change, "public access or external exposure related resource changed")

              if (
                  rtype.startswith("aws_route53_")
                  or rtype.startswith("aws_cloudfront_")
                  or rtype.startswith("aws_rds_")
                  or rtype in {"aws_db_instance", "aws_db_subnet_group", "aws_db_parameter_group"}
              ):
                  add("edge_data", change, "external DNS/CDN or data-layer related resource changed")

          lines = ["### Review Signals", ""]
          if not any(matches.values()):
              lines.append("No elevated review signals detected from structured Terraform plan JSON.")
              lines.append("")
              lines.append("Add count alone is not treated as a warning for the normal destroyed dev environment.")
          else:
              lines.append("These are review signals only. They do not change CI pass/fail behavior.")
              lines.append("")
              lines.append("| Signal | Count |")
              lines.append("|---|---:|")
              for key, label in categories.items():
                  lines.append(f"| {label} | {len(matches[key])} |")
              lines.append("")

              max_items = 12
              for key, label in categories.items():
                  items = matches[key]
                  if not items:
                      continue
                  lines.append(f"#### {label}")
                  lines.append("")
                  lines.extend(items[:max_items])
                  if len(items) > max_items:
                      lines.append(f"- ...and {len(items) - max_items} more")
                  lines.append("")

          Path("terraform-plan-signals.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Write Terraform plan summary
        if: always()
        env:
          PLAN_STATUS: ${{ steps.terraform_plan.outputs.plan_status }}
          ARTIFACT_NAME: terraform-plan-dev-${{ github.event.pull_request.number }}
        run: |
          set -e

          plan_file="terraform/environments/dev/terraform-plan.txt"
          exit_file="terraform/environments/dev/terraform-plan-exitcode.txt"
          signal_file="terraform/environments/dev/terraform-plan-signals.md"
          plan_exit="unknown"
          add_count="unknown"
          change_count="unknown"
          destroy_count="unknown"
          result_label="Not completed"
          result_note="Terraform plan did not complete. Check the job logs and artifact for details."

          if [ -f "$exit_file" ]; then
            plan_exit="$(cat "$exit_file")"
          fi

          if [ -f "$plan_file" ]; then
            plan_counts=$(sed -nE 's/^Plan: ([0-9]+) to add, ([0-9]+) to change, ([0-9]+) to destroy\..*/\1 \2 \3/p' "$plan_file" | tail -n 1)
            if [ -n "$plan_counts" ]; then
              set -- $plan_counts
              add_count="$1"
              change_count="$2"
              destroy_count="$3"
            elif grep -q '^No changes\.' "$plan_file"; then
              add_count="0"
              change_count="0"
              destroy_count="0"
            fi
          fi

          if [ "${PLAN_STATUS:-}" = "no_changes" ]; then
            result_label="No changes"
            result_note="Terraform reported no changes."
          elif [ "${PLAN_STATUS:-}" = "changes" ]; then
            result_label="Changes detected"
            result_note="Review the plan artifact for full details."

            if [ "$add_count" != "unknown" ] && [ "$change_count" = "0" ] && [ "$destroy_count" = "0" ]; then
              result_note="All-create plan. This is expected for the normal destroyed dev environment and is not treated as a warning by itself."
            fi
          elif [ "${PLAN_STATUS:-}" = "failed" ]; then
            result_label="Plan failed"
            result_note="Check the job logs and uploaded plan artifact for the failure reason."
          fi

          {
            echo "## Terraform Plan Summary"
            echo
            echo "- Environment: dev"
            echo "- dev is usually destroyed; an all-create plan is expected and is not treated as failure."
            echo "- Apply is not executed."
            echo "- Binary plan files are not uploaded."
            echo "- Text plan output artifact: \`$ARTIFACT_NAME\` (retention: 3 days)"
            echo
            echo "### Result"
            echo
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Status | \`$result_label\` |"
            echo "| Terraform exit code | \`$plan_exit\` |"
            echo "| Add | \`$add_count\` |"
            echo "| Change | \`$change_count\` |"
            echo "| Destroy | \`$destroy_count\` |"
            echo
            echo "$result_note"
            echo
            if [ -f "$signal_file" ]; then
              cat "$signal_file"
            else
              echo "### Review Signals"
              echo
              echo "Structured plan analysis did not run. Check the plan artifact and job logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
