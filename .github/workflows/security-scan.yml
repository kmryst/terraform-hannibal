# セキュリティスキャン統合ワークフロー
# 目的: 依存関係、コンテナの脆弱性を一元管理
# コードの脆弱性（CodeQL javascript-typescript）は .github/workflows/codeql.yml に一本化した
# （idp-golden-pathのreusable workflow経由でPR/pushごとに実行。Issue #510）。
# 本ファイルにあった sast-scan job（週次のみ実行、PR非トリガー）は重複のため削除した。

name: Security Scan
on:
  workflow_dispatch:
  schedule:
    # 毎週月曜 00:15 UTC / 09:15 JST。
    # 毎時0分付近の GitHub Actions 混雑を避けるため15分にずらす。
    - cron: "15 0 * * 1"
  # pull_request:
  #   branches: [main]

concurrency:
  group: security-scan
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Run Trivy vulnerability scanner (npm)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4.37.1
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          tags: nestjs-hannibal-3:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Run Trivy vulnerability scanner (Docker)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "nestjs-hannibal-3:${{ github.sha }}"
          format: "sarif"
          output: "trivy-container-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy container results
        uses: github/codeql-action/upload-sarif@v4.37.1
        if: always()
        with:
          sarif_file: "trivy-container-results.sarif"
  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - dependency-scan
      - container-scan
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Container Scan: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SAST Scan (CodeQL javascript-typescript): .github/workflows/codeql.yml を参照" >> $GITHUB_STEP_SUMMARY
          echo "詳細は [Security > Code scanning alerts](../../security/code-scanning) を確認" >> $GITHUB_STEP_SUMMARY
